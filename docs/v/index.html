<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deck — LIVRAI</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff5c26' stroke-width='1.8' stroke-linecap='round'%3E%3Cpath d='M4 4h7v7H4zM13 13h7v7h-7zM13 4l7 7M4 13l7 7'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b; --panel: #131316; --panel-2: #1a1a1f; --panel-3: #232329;
      --line: #26262c; --text: #e8e8ec; --muted: #85858d; --accent: #ff5c26;
      --font-display: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font: 14px/1.5 Inter, system-ui, sans-serif;
      overflow: hidden;
    }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* topo */
    #bar {
      position: fixed; inset: 0 0 auto 0; z-index: 50;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px;
      background: linear-gradient(180deg, rgba(10,10,11,.92), rgba(10,10,11,0));
      pointer-events: none;
    }
    #bar > * { pointer-events: auto; }
    .brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
    .brand svg { display: block; }
    .brand b { font-family: var(--font-display); letter-spacing: .06em; }
    #deck-title { color: var(--muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spacer { flex: 1; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px;
      color: var(--text); font: inherit; font-size: 13px; font-weight: 600;
      padding: 7px 14px; cursor: pointer; text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.cta { background: var(--accent); border-color: var(--accent); color: #14120a; }
    .btn.cta:hover { color: #14120a; filter: brightness(1.08); }

    /* viewport */
    #viewport { position: absolute; inset: 0; overflow: hidden; cursor: grab;
      background-image: radial-gradient(circle, #1b1b20 1px, transparent 1px); }
    #viewport.panning { cursor: grabbing; }
    #world { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
    #flow-svg { position: absolute; left: -50000px; top: -50000px; width: 100000px; height: 100000px; overflow: visible; pointer-events: none; }
    #flow-svg .edge-line { fill: none; stroke-width: 2; }

    .item { position: absolute; border-radius: 12px; box-shadow: 0 14px 34px rgba(0,0,0,.42); }
    .item-body { width: 100%; height: 100%; border-radius: inherit; overflow: hidden; }

    .item-note .item-body { background: #efe3a2; color: #2a2408; padding: 14px 16px; overflow: hidden; }
    .nh1 { font-family: var(--font-display); font-weight: 700; font-size: 17px; margin: 2px 0; }
    .nh2 { font-weight: 600; font-size: 12px; letter-spacing: .05em; text-transform: uppercase; opacity: .8; margin-top: 4px; }
    .nli { display: flex; gap: 8px; } .nli::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .7; flex: none; margin-top: 8px; }
    .ntodo { display: flex; gap: 8px; align-items: flex-start; }
    .ncheck { width: 14px; height: 14px; flex: none; margin-top: 3px; border-radius: 4px; border: 1.5px solid rgba(42,36,8,.55); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
    .ntodo.done .ncheck { background: #2a2408; color: #efe3a2; border-color: #2a2408; }
    .ntodo.done span { text-decoration: line-through; opacity: .6; }
    .nhr { height: 1px; background: rgba(42,36,8,.25); margin: 6px 0; }
    .np { min-height: 1.2em; }

    .item-label { box-shadow: none; }
    .item-label .item-body { background: transparent; display: flex; align-items: center; overflow: visible; }
    .label-text { font-family: var(--font-display); font-weight: 700; letter-spacing: .02em; text-transform: uppercase; white-space: nowrap; }

    .item-image .item-body { background: var(--panel-2); }
    .item-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-image.transparent { box-shadow: none; }
    .item-image.transparent .item-body { background: transparent; }
    .item-image.transparent img { object-fit: contain; }

    .item-color .item-body { display: flex; align-items: flex-end; padding: 10px; }
    .color-hex { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: rgba(0,0,0,.4); color: #fff; padding: 2px 8px; border-radius: 6px; }

    .item-link .item-body { background: var(--panel-2); border: 1px solid var(--line); padding: 14px 15px; display: flex; flex-direction: column; gap: 4px; }
    .link-title { font-weight: 600; } .link-domain { color: var(--muted); font-size: 12px; }
    .item-link a { color: var(--accent); font-size: 13px; margin-top: auto; }

    .item-frame { box-shadow: none; border: 1.5px solid var(--line); background: rgba(19,19,22,.4); border-radius: 6px; }
    .frame-title { position: absolute; top: -26px; left: 0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

    .item-flownode { box-shadow: none; }
    .item-flownode .item-body { display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px 16px;
      background: color-mix(in srgb, var(--fc) 16%, var(--panel)); border: 1.5px solid var(--fc); font-weight: 600; }
    .shape-step .item-body { border-radius: 14px; }
    .shape-startend .item-body { border-radius: 99px; }
    .shape-decision .item-body { clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); border: none;
      background: color-mix(in srgb, var(--fc) 26%, var(--panel)); }

    .item-post .item-body { background: var(--panel-2); border: 1px solid var(--line); display: flex; flex-direction: column; }
    .post-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 11px 0; }
    .post-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); background: var(--panel-3); border-radius: 7px; padding: 4px 9px; }
    .post-status { border-radius: 99px; color: #14120a; font-size: 11px; font-weight: 700; padding: 4px 11px; }
    .post-media { position: relative; margin: 8px 8px 0; flex: 0 0 48%; min-height: 0; border-radius: 8px; overflow: hidden; background: #0b0b0e; }
    .post-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-nav { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; align-items: center;
      background: rgba(0,0,0,.65); border-radius: 99px; padding: 1px 6px; color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; }
    .post-nav button { background: none; border: none; color: #fff; font-size: 15px; cursor: pointer; padding: 2px 5px; }
    .post-text { padding: 12px 14px; flex: 1; overflow: hidden; white-space: pre-wrap; font-size: 13px; }

    .item-ph .item-body { background: var(--panel-2); border: 1px dashed var(--line); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; color: var(--muted); font-size: 12.5px; padding: 12px; text-align: center; }

    /* zoom */
    #zoom { position: fixed; right: 16px; bottom: 16px; z-index: 50; display: flex; gap: 6px; }
    #zoom .btn { padding: 7px 11px; }

    /* estados */
    .gate { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 80; background: var(--bg); }
    .gate-box { width: min(420px, calc(100vw - 40px)); background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 28px; text-align: center; }
    .gate-box h2 { font-family: var(--font-display); margin-bottom: 8px; }
    .gate-box p { color: var(--muted); margin-bottom: 16px; }
    .gate-box input { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
      color: var(--text); font: inherit; padding: 11px 14px; margin-bottom: 12px; text-align: center; }
    .gate-box input:focus { outline: none; border-color: var(--accent); }
    .hidden { display: none !important; }
    @keyframes shake { 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); } }
    .shake { animation: shake .22s 2; }
  </style>
</head>
<body>

  <div id="gate" class="gate">
    <div class="gate-box" id="gate-box">
      <h2 id="gate-title">Abrindo o deck…</h2>
      <p id="gate-msg">Um instante.</p>
      <input id="gate-pass" type="password" placeholder="Senha do deck" class="hidden" autocomplete="off">
      <button id="gate-go" class="btn cta hidden">Abrir</button>
    </div>
  </div>

  <div id="viewport" class="hidden">
    <div id="world">
      <svg id="flow-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div id="bar" class="hidden">
    <a class="brand" href="https://louisluix.github.io/livrai/" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff5c26" stroke-width="1.8" stroke-linecap="round"><path d="M4 4h7v7H4zM13 13h7v7h-7zM13 4l7 7M4 13l7 7"/></svg>
      <b>LIVRAI</b>
    </a>
    <span id="deck-title" class="mono"></span>
    <span class="spacer"></span>
    <a class="btn cta" href="https://github.com/LouisLuix/livrai/releases/latest" target="_blank" rel="noopener">Baixar o LIVRAI</a>
  </div>

  <div id="zoom" class="hidden">
    <button class="btn" id="z-out">−</button>
    <button class="btn" id="z-fit">Enquadrar</button>
    <button class="btn" id="z-in">+</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
  (function () {
    firebase.initializeApp({
      apiKey: 'AIzaSyCV3zo_rMbu0yTbT51NsHFr3Jyx438J-eY',
      authDomain: 'livrai-e97aa.firebaseapp.com',
      projectId: 'livrai-e97aa',
    });
    const db = firebase.firestore();

    const POST_STATUS = {
      ideia: ['Ideia', '#a78bfa'], roteiro: ['Roteiro', '#60a5fa'], gravado: ['Gravado', '#fbbf24'],
      editado: ['Editado', '#fb923c'], postado: ['Postado', '#34d399'],
    };

    const $ = (id) => document.getElementById(id);
    const gateTitle = $('gate-title'), gateMsg = $('gate-msg'), gatePass = $('gate-pass'), gateGo = $('gate-go');

    function fail(msg) {
      gateTitle.textContent = 'Esse link não abriu';
      gateMsg.textContent = msg;
      gatePass.classList.add('hidden');
      gateGo.classList.add('hidden');
    }

    /* ---------- util ---------- */
    function b64ToBuf(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes.buffer;
    }
    async function gunzip(buf) {
      const ds = new DecompressionStream('gzip');
      const out = await new Response(new Blob([buf]).stream().pipeThrough(ds)).arrayBuffer();
      return new TextDecoder().decode(out);
    }
    async function decrypt(buf, password, saltB64, ivB64) {
      const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64ToBuf(saltB64), iterations: 200000, hash: 'SHA-256' },
        base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(b64ToBuf(ivB64)) }, key, buf);
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmt(s) {
      return esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    /* ---------- carga ---------- */
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { fail('O endereço está incompleto.'); return; }

    let meta = null;
    let cipherBuf = null;

    (async () => {
      try {
        const snap = await db.collection('shares').doc(id).get();
        if (!snap.exists) { fail('O dono revogou este link, ou ele nunca existiu.'); return; }
        meta = snap.data();
        const chunks = await db.collection('shares').doc(id).collection('chunks').get();
        const parts = chunks.docs.map((d) => d.data()).sort((a, b) => a.i - b.i).map((d) => d.d);
        cipherBuf = b64ToBuf(parts.join(''));
        if (meta.enc) {
          gateTitle.textContent = 'Deck protegido';
          gateMsg.textContent = 'Esse deck tem senha. Quem te mandou o link sabe ela.';
          gatePass.classList.remove('hidden');
          gateGo.classList.remove('hidden');
          gatePass.focus();
        } else {
          openDeck(cipherBuf);
        }
      } catch (e) {
        console.error(e);
        fail('Não consegui carregar agora — tente de novo em instantes.');
      }
    })();

    async function tryPassword() {
      const pass = gatePass.value;
      if (!pass) return;
      gateGo.disabled = true;
      try {
        const plain = await decrypt(cipherBuf, pass, meta.salt, meta.iv);
        openDeck(plain);
      } catch (_) {
        gateGo.disabled = false;
        $('gate-box').classList.remove('shake');
        void $('gate-box').offsetWidth;
        $('gate-box').classList.add('shake');
        gateMsg.textContent = 'Senha incorreta — tente de novo.';
      }
    }
    gateGo.addEventListener('click', tryPassword);
    gatePass.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryPassword(); });

    async function openDeck(buf) {
      let json;
      try {
        json = meta.gz ? await gunzip(buf) : new TextDecoder().decode(buf);
        const deck = JSON.parse(json);
        $('gate').classList.add('hidden');
        $('viewport').classList.remove('hidden');
        $('bar').classList.remove('hidden');
        $('zoom').classList.remove('hidden');
        $('deck-title').textContent = deck.project + ' · ' + deck.board;
        document.title = deck.project + ' — LIVRAI';
        render(deck);
      } catch (e) {
        console.error(e);
        fail('O conteúdo deste link está corrompido.');
      }
    }

    /* ---------- render ---------- */
    const world = $('world');
    const viewport = $('viewport');
    const svg = $('flow-svg');
    const NS = 'http://www.w3.org/2000/svg';
    let items = [];

    function render(deck) {
      items = deck.items || [];
      const mediaUrl = {};
      Object.keys(deck.media || {}).forEach((k) => {
        mediaUrl[k] = 'data:' + deck.media[k].t + ';base64,' + deck.media[k].d;
      });

      items.slice().sort((a, b) => (a.z || 1) - (b.z || 1)).forEach((it) => {
        const el = document.createElement('div');
        el.className = 'item item-' + it.kind;
        el.style.left = it.x + 'px';
        el.style.top = it.y + 'px';
        el.style.width = it.w + 'px';
        el.style.height = it.h + 'px';
        el.style.zIndex = (it.z || 1) + 10;
        const body = document.createElement('div');
        body.className = 'item-body';
        el.appendChild(body);
        const c = it.content || {};

        if (it.kind === 'note') body.innerHTML = noteHtml(c.text);
        else if (it.kind === 'label') {
          body.innerHTML = '<span class="label-text">' + esc(c.text) + '</span>';
          body.querySelector('.label-text').style.fontSize = Math.max(14, Math.round(it.h * 0.55)) + 'px';
        } else if (it.kind === 'color') {
          body.style.background = c.hex;
          body.innerHTML = '<span class="color-hex">' + esc(c.hex) + '</span>';
        } else if (it.kind === 'link') {
          let host = '';
          try { host = new URL(c.url).hostname.replace(/^www\./, ''); } catch (_) {}
          body.innerHTML =
            '<div class="link-title">' + esc(c.title || host || 'Link') + '</div>' +
            '<div class="link-domain">' + esc(host) + '</div>' +
            (c.url ? '<a href="' + esc(c.url) + '" target="_blank" rel="noopener">Abrir ↗</a>' : '');
        } else if (it.kind === 'frame') {
          el.innerHTML = '<div class="frame-title">' + esc(c.text || 'Prancha') + '</div>';
          el.style.zIndex = 1;
        } else if (it.kind === 'flownode') {
          el.classList.add('shape-' + (c.shape || 'step'));
          el.style.setProperty('--fc', c.color || '#ff5c26');
          body.textContent = c.text || '';
        } else if (it.kind === 'image') {
          if (c.hasAlpha) el.classList.add('transparent');
          body.innerHTML = c.m && mediaUrl[c.m] ? '<img src="' + mediaUrl[c.m] + '" alt="">' : '';
        } else if (it.kind === 'post') {
          renderPost(body, c, mediaUrl);
        } else {
          el.classList.add('item-ph');
          body.innerHTML =
            '<span class="mono" style="font-size:10px;letter-spacing:.12em;border:1px solid currentColor;border-radius:5px;padding:2px 7px">' +
            (c.placeholder === 'video' ? 'VÍDEO' : c.placeholder === 'audio' ? 'ÁUDIO' : 'ARQUIVO') + '</span>' +
            '<span>' + esc(c.title || c.name || 'Arquivo') + '</span>' +
            '<span class="mono" style="font-size:10px;opacity:.6">não incluído no link</span>';
        }
        world.appendChild(el);
      });

      drawEdges();
      fitView();
    }

    function noteHtml(text) {
      return String(text || '').split('\n').map((line) => {
        const todo = line.match(/^\[(x|X| )?\]\s?(.*)$/);
        if (/^---+\s*$/.test(line)) return '<div class="nhr"></div>';
        if (line.indexOf('## ') === 0) return '<div class="nh2">' + fmt(line.slice(3)) + '</div>';
        if (line.indexOf('# ') === 0) return '<div class="nh1">' + fmt(line.slice(2)) + '</div>';
        if (line.indexOf('- ') === 0) return '<div class="nli"><span>' + fmt(line.slice(2)) + '</span></div>';
        if (todo) {
          const done = (todo[1] || '').toLowerCase() === 'x';
          return '<div class="ntodo' + (done ? ' done' : '') + '"><span class="ncheck">' + (done ? '✓' : '') + '</span><span>' + fmt(todo[2]) + '</span></div>';
        }
        return '<div class="np">' + (line.trim() ? fmt(line) : '&nbsp;') + '</div>';
      }).join('');
    }

    function renderPost(body, c, mediaUrl) {
      const st = POST_STATUS[c.status] || POST_STATUS.ideia;
      const top = document.createElement('div');
      top.className = 'post-top';
      top.innerHTML =
        '<span class="post-date">' + esc(c.date ? c.date.split('-').reverse().join('/') : 'sem data') + '</span>' +
        '<span class="post-status" style="background:' + st[1] + '">' + st[0] + '</span>';
      body.appendChild(top);
      const media = (c.media || []).filter((m) => m.m && mediaUrl[m.m]);
      if (media.length) {
        let idx = 0;
        const wrap = document.createElement('div');
        wrap.className = 'post-media';
        const img = document.createElement('img');
        img.src = mediaUrl[media[0].m];
        wrap.appendChild(img);
        if (media.length > 1) {
          const nav = document.createElement('div');
          nav.className = 'post-nav';
          const prev = document.createElement('button'); prev.textContent = '‹';
          const count = document.createElement('span'); count.textContent = '1/' + media.length;
          const next = document.createElement('button'); next.textContent = '›';
          const go = (d) => {
            idx = (idx + d + media.length) % media.length;
            img.src = mediaUrl[media[idx].m];
            count.textContent = (idx + 1) + '/' + media.length;
          };
          prev.addEventListener('click', (e) => { e.stopPropagation(); go(-1); });
          next.addEventListener('click', (e) => { e.stopPropagation(); go(1); });
          nav.appendChild(prev); nav.appendChild(count); nav.appendChild(next);
          wrap.appendChild(nav);
        }
        body.appendChild(wrap);
      }
      const t = document.createElement('div');
      t.className = 'post-text';
      t.textContent = c.text || '';
      body.appendChild(t);
    }

    /* setas do fluxograma — mesma geometria do app */
    function center(it) { return { x: it.x + it.w / 2, y: it.y + it.h / 2 }; }
    function pickSides(a, b) {
      const ca = center(a), cb = center(b);
      if (Math.abs(cb.x - ca.x) >= Math.abs(cb.y - ca.y)) return cb.x >= ca.x ? ['r', 'l'] : ['l', 'r'];
      return cb.y >= ca.y ? ['b', 't'] : ['t', 'b'];
    }
    function anchor(it, s) {
      if (s === 'l') return { x: it.x, y: it.y + it.h / 2 };
      if (s === 'r') return { x: it.x + it.w, y: it.y + it.h / 2 };
      if (s === 't') return { x: it.x + it.w / 2, y: it.y };
      return { x: it.x + it.w / 2, y: it.y + it.h };
    }
    function normal(s) {
      return s === 'r' ? { x: 1, y: 0 } : s === 'l' ? { x: -1, y: 0 } : s === 'b' ? { x: 0, y: 1 } : { x: 0, y: -1 };
    }
    function drawEdges() {
      const byId = new Map();
      items.forEach((it) => byId.set(it.id, it));
      items.forEach((it) => {
        const edges = it.content && it.content.next;
        if (!edges) return;
        edges.forEach((e) => {
          const target = byId.get(e.to);
          if (!target || target === it) return;
          drawEdge(it, target, e.label || '', it.kind === 'flownode' ? (it.content.color || '#85858d') : '#85858d');
        });
      });
    }
    function drawEdge(from, to, label, color) {
      const sides = pickSides(from, to);
      const p1 = anchor(from, sides[0]);
      const p2 = anchor(to, sides[1]);
      const n1 = normal(sides[0]), n2 = normal(sides[1]);
      const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const k = Math.min(170, Math.max(36, dist * 0.4));
      const c1 = { x: p1.x + n1.x * k, y: p1.y + n1.y * k };
      const c2 = { x: p2.x + n2.x * k, y: p2.y + n2.y * k };
      const OFF = 50000;
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('class', 'edge-line');
      path.setAttribute('stroke', color);
      path.setAttribute('d',
        'M' + (p1.x + OFF) + ' ' + (p1.y + OFF) +
        ' C' + (c1.x + OFF) + ' ' + (c1.y + OFF) + ' ' + (c2.x + OFF) + ' ' + (c2.y + OFF) + ' ' + (p2.x + OFF) + ' ' + (p2.y + OFF));
      svg.appendChild(path);
      let dir = { x: p2.x - c2.x, y: p2.y - c2.y };
      const len = Math.hypot(dir.x, dir.y) || 1;
      dir = { x: dir.x / len, y: dir.y / len };
      const bx = p2.x - dir.x * 11, by = p2.y - dir.y * 11;
      const px = -dir.y, py = dir.x;
      const head = document.createElementNS(NS, 'path');
      head.setAttribute('fill', color);
      head.setAttribute('d',
        'M' + (p2.x + OFF) + ' ' + (p2.y + OFF) +
        ' L' + (bx + px * 4.5 + OFF) + ' ' + (by + py * 4.5 + OFF) +
        ' L' + (bx - px * 4.5 + OFF) + ' ' + (by - py * 4.5 + OFF) + ' Z');
      svg.appendChild(head);
      if (label) {
        const mid = { x: (p1.x + 3 * c1.x + 3 * c2.x + p2.x) / 8, y: (p1.y + 3 * c1.y + 3 * c2.y + p2.y) / 8 };
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', mid.x + OFF);
        t.setAttribute('y', mid.y + OFF - 7);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('fill', '#cfcdc5');
        t.setAttribute('stroke', '#0a0a0b');
        t.setAttribute('stroke-width', '4');
        t.setAttribute('paint-order', 'stroke');
        t.style.font = '12px Inter, sans-serif';
        t.textContent = label;
        svg.appendChild(t);
      }
    }

    /* ---------- câmera ---------- */
    let cam = { x: 0, y: 0, z: 1 };
    function apply() {
      world.style.transform = 'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.z + ')';
      viewport.style.backgroundSize = (24 * cam.z) + 'px ' + (24 * cam.z) + 'px';
      viewport.style.backgroundPosition = cam.x + 'px ' + cam.y + 'px';
    }
    function fitView() {
      const r = viewport.getBoundingClientRect();
      if (!items.length) { cam = { x: r.width / 2, y: r.height / 2, z: 1 }; apply(); return; }
      let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
      items.forEach((it) => {
        minX = Math.min(minX, it.x); minY = Math.min(minY, it.y);
        maxX = Math.max(maxX, it.x + it.w); maxY = Math.max(maxY, it.y + it.h);
      });
      const pad = 90;
      const z = Math.min(1.3, Math.max(0.04, Math.min(r.width / (maxX - minX + pad * 2), r.height / (maxY - minY + pad * 2))));
      cam = { z: z, x: (r.width - (maxX + minX) * z) / 2, y: (r.height - (maxY + minY) * z) / 2 };
      apply();
    }
    let drag = null;
    viewport.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button, a, input')) return;
      drag = { sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
      viewport.classList.add('panning');
      viewport.setPointerCapture(e.pointerId);
    });
    viewport.addEventListener('pointermove', (e) => {
      if (!drag) return;
      cam.x = drag.cx + e.clientX - drag.sx;
      cam.y = drag.cy + e.clientY - drag.sy;
      apply();
    });
    viewport.addEventListener('pointerup', () => { drag = null; viewport.classList.remove('panning'); });
    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) {
        const r = viewport.getBoundingClientRect();
        const px = e.clientX - r.left, py = e.clientY - r.top;
        const wx = (px - cam.x) / cam.z, wy = (py - cam.y) / cam.z;
        cam.z = Math.min(4, Math.max(0.04, cam.z * Math.exp(-e.deltaY * 0.01)));
        cam.x = px - wx * cam.z; cam.y = py - wy * cam.z;
      } else { cam.x -= e.deltaX; cam.y -= e.deltaY; }
      apply();
    }, { passive: false });
    document.getElementById('z-in').addEventListener('click', () => { cam.z = Math.min(4, cam.z * 1.25); apply(); });
    document.getElementById('z-out').addEventListener('click', () => { cam.z = Math.max(0.04, cam.z * 0.8); apply(); });
    document.getElementById('z-fit').addEventListener('click', fitView);
  })();
  </script>
</body>
</html>
