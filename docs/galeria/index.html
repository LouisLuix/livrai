<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galeria da comunidade — LIVRAI</title>
  <meta name="description" content="Decks compartilhados por quem cria com o LIVRAI.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff5c26' stroke-width='1.8' stroke-linecap='round'%3E%3Cpath d='M4 4h7v7H4zM13 13h7v7h-7zM13 4l7 7M4 13l7 7'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0b; --panel:#131316; --panel-2:#1a1a1f; --line:#26262c; --text:#e8e8ec; --muted:#85858d; --accent:#ff5c26; }
    * { box-sizing: border-box; margin: 0; }
    body { background: var(--bg); color: var(--text); font: 15px/1.6 Inter, system-ui, sans-serif; min-height: 100vh; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
    header { display: flex; align-items: center; gap: 10px; padding: 22px clamp(20px, 5vw, 64px); }
    .brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
    .brand b { font-family: 'Space Grotesk', sans-serif; letter-spacing: .06em; }
    .spacer { flex: 1; }
    .btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); border: none; border-radius: 10px;
      color: #14120a; font: inherit; font-size: 14px; font-weight: 600; padding: 9px 18px; text-decoration: none; }
    main { padding: 10px clamp(20px, 5vw, 64px) 80px; max-width: 1280px; margin: 0 auto; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 4.5vw, 44px); margin: 18px 0 6px; }
    .sub { color: var(--muted); margin-bottom: 34px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; }
    .card { display: block; text-decoration: none; color: var(--text); background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; overflow: hidden; transition: transform .22s cubic-bezier(.22,1,.36,1), border-color .22s; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .card-cover { aspect-ratio: 4/3; background: var(--panel-2); overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-info { padding: 13px 15px; }
    .card-info strong { display: block; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-info span { font-size: 11px; color: var(--muted); }
    #empty { color: var(--muted); text-align: center; padding: 80px 0; }
    footer { color: var(--muted); font-size: 13px; text-align: center; padding: 30px; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="https://louisluix.github.io/livrai/">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff5c26" stroke-width="1.8" stroke-linecap="round"><path d="M4 4h7v7H4zM13 13h7v7h-7zM13 4l7 7M4 13l7 7"/></svg>
      <b>LIVRAI</b>
    </a>
    <span class="spacer"></span>
    <a class="btn" href="https://github.com/LouisLuix/livrai/releases/latest">Baixar o app</a>
  </header>
  <main>
    <h1>Galeria da comunidade</h1>
    <p class="sub">Decks reais, compartilhados por quem dirige criação com o LIVRAI. Publique o seu pelo botão Compartilhar do canvas.</p>
    <div id="grid"></div>
    <p id="empty" hidden>Ainda não tem deck publicado — o seu pode ser o primeiro.</p>
  </main>
  <footer>Feito livre por <a href="https://instagram.com/luisluix" target="_blank" rel="noopener">@luisluix</a> · código aberto no <a href="https://github.com/LouisLuix/livrai" target="_blank" rel="noopener">GitHub</a></footer>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: 'AIzaSyCV3zo_rMbu0yTbT51NsHFr3Jyx438J-eY',
      authDomain: 'livrai-e97aa.firebaseapp.com',
      projectId: 'livrai-e97aa',
    });
    const grid = document.getElementById('grid');
    firebase.firestore().collection('gallery').get().then((snap) => {
      const docs = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      if (!docs.length) {
        document.getElementById('empty').hidden = false;
        return;
      }
      docs.forEach((d) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = '../v/?id=' + encodeURIComponent(d.id);
        const cover = document.createElement('div');
        cover.className = 'card-cover';
        if (d.cover) {
          const img = document.createElement('img');
          img.src = d.cover;
          img.alt = '';
          cover.appendChild(img);
        } else {
          cover.textContent = 'deck';
        }
        const info = document.createElement('div');
        info.className = 'card-info';
        const t = document.createElement('strong');
        t.textContent = d.title || 'Deck';
        const when = document.createElement('span');
        when.className = 'mono';
        when.textContent = new Date(d.updatedAt || 0).toLocaleDateString('pt-BR');
        info.appendChild(t);
        info.appendChild(when);
        a.appendChild(cover);
        a.appendChild(info);
        grid.appendChild(a);
      });
    }).catch(() => {
      document.getElementById('empty').hidden = false;
    });
  </script>
</body>
</html>
